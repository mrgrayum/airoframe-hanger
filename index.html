<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airoframe™ Hanger Finder</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #1a1a1a; font-size: 24px; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 25px; font-size: 14px; }
        
        .search-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555; }
        
        select, input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; background: white; }
        select:focus, input:focus { border-color: #007bff; }
        
        #result-box { margin-top: 30px; padding: 20px; border-radius: 8px; background: #eef6ff; display: none; border: 1px solid #d0e3ff; }
        .size-label { font-size: 14px; color: #555; text-transform: uppercase; letter-spacing: 1px; }
        .size-value { font-size: 48px; font-weight: 800; color: #007bff; margin: 10px 0; }
        .disc-name { font-size: 18px; font-weight: 600; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h1>Airoframe™ Hanger Finder</h1>
    <p>Find the perfect fit for your collection.</p>
    
    <div class="search-group">
        <label>Step 1: Select Manufacturer</label>
        <select id="mfg-select" onchange="updateMolds()">
            <option value="">-- Choose Brand --</option>
        </select>
    </div>

    <div class="search-group">
        <label>Step 2: Select Disc Name</label>
        <select id="mold-select" onchange="showResult()" disabled>
            <option value="">-- Choose Disc --</option>
        </select>
    </div>

    <p style="margin: 15px 0;">- OR -</p>

    <div class="search-group">
        <label>Quick Search</label>
        <input type="text" id="quick-search" placeholder="Start typing a disc name..." oninput="handleQuickSearch()">
    </div>

    <div id="result-box">
        <div class="size-label">Required Hanger Size</div>
        <div class="size-value" id="res-size">--</div>
        <div class="disc-name" id="res-name"></div>
    </div>
</div>

<script>
    let discData = [];

    fetch('discdata.json')
        .then(response => response.json())
        .then(data => {
            discData = data;
            populateManufacturers();
        })
        .catch(err => console.error('Error loading JSON:', err));

    function populateManufacturers() {
        const mfgSelect = document.getElementById('mfg-select');
        const manufacturers = [...new Set(discData.map(item => item.Manufacturer))].sort();
        
        manufacturers.forEach(mfg => {
            const opt = document.createElement('option');
            opt.value = mfg;
            opt.textContent = mfg;
            mfgSelect.appendChild(opt);
        });
    }

    function updateMolds() {
        const mfg = document.getElementById('mfg-select').value;
        const moldSelect = document.getElementById('mold-select');
        moldSelect.innerHTML = '<option value="">-- Choose Disc --</option>';
        
        if (!mfg) {
            moldSelect.disabled = true;
            return;
        }

        const filtered = discData.filter(item => item.Manufacturer === mfg).sort((a,b) => a.Mold.localeCompare(b.Mold));
        filtered.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.Mold;
            opt.textContent = item.Mold;
            moldSelect.appendChild(opt);
        });
        
        moldSelect.disabled = false;
        document.getElementById('result-box').style.display = 'none';
    }

    function showResult() {
        const mfg = document.getElementById('mfg-select').value;
        const mold = document.getElementById('mold-select').value;
        if (!mfg || !mold) return;

        const disc = discData.find(item => item.Manufacturer === mfg && item.Mold === mold);
        displayFinal(disc);
    }

    function handleQuickSearch() {
        const query = document.getElementById('quick-search').value.toLowerCase();
        if (query.length < 2) {
            document.getElementById('result-box').style.display = 'none';
            return;
        }

        const disc = discData.find(item => 
            item.Mold.toLowerCase() === query || 
            item.Mold.toLowerCase().startsWith(query)
        );

        if (disc) displayFinal(disc);
    }

    function displayFinal(disc) {
        const box = document.getElementById('result-box');
        document.getElementById('res-size').textContent = 'Size ' + disc.HangerSize;
        document.getElementById('res-name').textContent = disc.Manufacturer + ' ' + disc.Mold;
        box.style.display = 'block';
    }
</script>

</body>
</html>
