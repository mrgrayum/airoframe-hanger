<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airoframe™ Hanger Index</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a1a1a; font-size: 24px; margin-bottom: 10px; text-align: center; }
        p { text-align: center; color: #666; margin-bottom: 25px; }
        #search { width: 100%; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; outline: none; transition: border-color 0.3s; }
        #search:focus { border-color: #007bff; }
        #results { margin-top: 20px; }
        .disc-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .disc-item:last-child { border-bottom: none; }
        .disc-info { font-weight: 600; font-size: 18px; }
        .hanger-tag { background: #007bff; color: white; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .no-results { text-align: center; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Airoframe™ Hanger Index</h1>
    <p>Search for a disc to find the compatible hanger size.</p>
    
    <input type="text" id="search" placeholder="Type disc name (e.g. Envy, Buzzz)..." onkeyup="filterDiscs()">

    <div id="results">
        <!-- Results will be injected here -->
    </div>
</div>

<script>
    let discData = [];

    // Load the JSON data from your repository
    fetch('discdata.json')
        .then(response => response.json())
        .then(data => {
            discData = data;
            displayResults(discData);
        })
        .catch(err => console.error('Error loading disc data:', err));

    function displayResults(data) {
        const container = document.getElementById('results');
        container.innerHTML = '';

        if (data.length === 0) {
            container.innerHTML = '<p class="no-results">No discs found.</p>';
            return;
        }

        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'disc-item';
            div.innerHTML = `
                <div class="disc-info">${item.Manufacturer} ${item.Mold}</div>
                <div class="hanger-tag">Size ${item.HangerSize}</div>
            `;
            container.appendChild(div);
        });
    }

    function filterDiscs() {
        const query = document.getElementById('search').value.toLowerCase();
        const filtered = discData.filter(item => 
            item.Mold.toLowerCase().includes(query) || 
            item.Manufacturer.toLowerCase().includes(query)
        );
        displayResults(filtered);
    }
</script>

</body>
</html>
